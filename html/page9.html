<!DOCTYPE html>
<html lang="vi">

<head>

<title>Thiết kế trang sản phẩm</title>

<meta charset="utf-8">


<link href ="../css/style5.css" rel ="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script src="../js/lib.js"></script>



<style>


body{

    background:#f1f3f6;
    font-family:Arial, sans-serif;

}



.container{

    padding-top:40px;
    padding-bottom:40px;

}



.title{

    text-align:center;
    margin-bottom:40px;
    font-size:35px;
    font-weight:bold;

}




#product-list .card{


    border:none;
    border-radius:20px;
    overflow:hidden;
    background:white;

    height:100%;

    transition:0.3s;


    box-shadow:
    0 5px 15px rgba(0,0,0,0.15);

}



#product-list .card:hover{


    transform:translateY(-10px);

    box-shadow:
    0 15px 30px rgba(0,0,0,0.25);

}




#product-list img{


    width:100%;
    height:220px;
    object-fit:cover;


}




.card-body{

    padding:20px;
    text-align:center;

}



.card-title{

    font-size:22px;
    font-weight:bold;

}



.price{


    color:red;
    font-size:20px;
    font-weight:bold;

}



.btn-detail{


    display:inline-block;

    margin-top:15px;

    padding:10px 25px;

    background:#0d6efd;

    color:white;

    border-radius:30px;

    text-decoration:none;


}



.btn-detail:hover{


    background:#084298;
    color:white;

}



</style>


</head>



<body>



<div class="container">



<h1 class="title">

Danh sách xe 

</h1>




<div id="product-list" 
class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">



</div>



</div>

loadAllProducts(products);


</script>



</body>



</html>
