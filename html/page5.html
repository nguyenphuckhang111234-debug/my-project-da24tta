<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="utf-8">

<title>Xin chào</title>


<style>

*{
    box-sizing:border-box;
}


body{

    height:100vh;

    margin:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background: linear-gradient(135deg,#1ec1cf,#bc50c6);

    font-family:Arial, sans-serif;

}



.container{


    width:350px;

    background:white;

    padding:40px;

    border-radius:25px;

    text-align:center;


    box-shadow:
    0 20px 50px #0005;


    animation:show 0.8s;

}



@keyframes show{

    from{

        opacity:0;

        transform:translateY(50px);

    }


    to{

        opacity:1;

        transform:translateY(0);

    }

}




h2{

    color:#667eea;

}



#name{


    font-size:30px;

    font-weight:bold;

    color:#e91e63;

    margin:25px;


}



button{


    padding:12px 25px;

    border:none;

    border-radius:20px;


    background:#667eea;

    color:white;


    font-size:16px;

    cursor:pointer;


}



button:hover{

    background:#e91e63;

}



</style>


</head>



<body>



<div class="container">


<h2>Mình chào các cụ nhá</h2>


<p id="name">
    Khang nè!!
</p>



<button onclick="chao()">
    Nhấn để chào
</button>



</div>





<script>


function chao(){


    let name =
    document.getElementById("name").innerHTML.trim();



    window.alert(
        "Xin chào " 
        + name 
        + "! Chúc bạn một ngày vui vẻ !!"
    );


}


</script>


</body>


</html>
