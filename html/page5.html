<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Hiển thị câu chào với hộp thoại alert()</title>
    <meta charset="utf-8">

    <!-- <link rel="stylesheet" href="../css/style01.css"> -->
</head>

<body>

    <div class="container">
        <p id="name">
            PhKhang
        </p>
    </div>

    <script>

        let name = document.getElementById("name").innerHTML;

        window.alert("Xin chào " + name + "! Chúc bạn buổi chiều vui vẻ!");

    </script>

</body>

</html>
