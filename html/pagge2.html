<!DOCTYPE html>
<html lang="vi">

<head>

    <title>Thiết kế form đăng nhập</title>

    <meta charset="utf-8">

    <link href="../css/style3.css" rel="stylesheet">

</head>


<body>


<div class="container">


<form>


<h2 id="title">
    🔐 Đăng Nhập
</h2>



<div class="form-group">


<label for="txtUsername">
    Tên Sử Dụng:
</label>


<input 
type="text" 
id="txtUsername" 
name="txtUsername"
placeholder="Nhập tên sử dụng">


</div>




<div class="form-group">


<label for="txtPassword">
    Mật Khẩu:
</label>


<input 
type="password" 
id="txtPassword" 
name="txtPassword"
placeholder="Nhập mật khẩu">


</div>





<div class="button-group">


<input 
type="submit" 
name="sbLogin" 
id="sbLogin" 
value="Đăng nhập">



<input 
type="reset" 
name="rsCancel" 
id="rsCancel" 
value="Thoát">


</div>





<a href="register.html">
    ➜ Đến trang đăng ký
</a>


<br>
<a href="../index.html">
    🏠 Trang chủ
</a>




</form>



</div>



</body>

</html>
